<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h1 class="h4 mb-0">
                            <i class="bi bi-check2-square me-2"></i>Todo App
                        </h1>
                    </div>
                    <div class="card-body">
                        <!-- Add Todo Form -->
                        <form id="todo-form" class="mb-4">
                            <div class="input-group">
                                <input type="text" 
                                       id="todo-input" 
                                       class="form-control" 
                                       placeholder="What needs to be done?" 
                                       aria-label="Todo title"
                                       required>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-plus-lg"></i> Add
                                </button>
                            </div>
                        </form>
                        
                        <!-- Todo List -->
                        <ul id="todo-list" class="list-group list-group-flush">
                            <!-- Todos will be rendered here -->
                        </ul>
                        
                        <!-- Empty State -->
                        <div id="empty-state" class="text-center text-muted py-4" style="display: none;">
                            <i class="bi bi-inbox h1"></i>
                            <p class="mb-0">No todos yet. Add one above!</p>
                        </div>
                        
                        <!-- Loading State -->
                        <div id="loading-state" class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-muted text-center">
                        <small id="todo-count">0 items</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
